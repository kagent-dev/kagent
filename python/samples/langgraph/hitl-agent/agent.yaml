apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: hitl-agent
spec:
  description: A LangGraph agent demonstrating HITL agent approval with safe and dangerous tools
  type: BYO
  byo:
    deployment:
      image: localhost:5001/langgraph-hitl-agent:latest
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-openai
              key: OPENAI_API_KEY