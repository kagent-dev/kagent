[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kagent-ag2"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "kagent-core>=0.1.0",
    "ag2[openai]>=0.11.0",
    "a2a-sdk>=0.3.23",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kagent"]
