# External Secrets Operator — automatic rotation of API keys and delegation
# tokens from a backend secret store (Vault shown; swap provider for AWS
# Secrets Manager, GCP Secret Manager, Azure Key Vault as needed).
#
# Prerequisites:
#   helm install external-secrets external-secrets/external-secrets \
#     --namespace external-secrets --create-namespace
#
# Vault setup (one-time):
#   vault kv put secret/kagent/team-beta/openai api-key=sk-...
#   vault kv put secret/kagent/shared/delegation-token token=<random-256bit>

# ── SecretStore: team-beta reads its own Vault path ──────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: team-beta
spec:
  provider:
    vault:
      server: "https://vault.your-cluster.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "team-beta-agent"
          serviceAccountRef:
            name: specialist-agent
---
# Sync openai API key — rotates every 1h; ESO reconciles automatically
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-secret
  namespace: team-beta
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: openai-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: kagent/team-beta/openai
        property: api-key
---
# Sync delegation token — rotated daily from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: specialist-delegation-token
  namespace: team-beta
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: specialist-delegation-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: kagent/shared/delegation-token
        property: token

# ── SecretStore: team-alpha reads its own Vault path ─────────────────────────
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: team-alpha
spec:
  provider:
    vault:
      server: "https://vault.your-cluster.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "team-alpha-agent"
          serviceAccountRef:
            name: orchestrator-agent
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openai-secret
  namespace: team-alpha
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: openai-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: api-key
      remoteRef:
        key: kagent/team-alpha/openai
        property: api-key
---
# Orchestrator reads the SAME shared delegation token path as the specialist.
# Vault ensures both sides always have the current value after rotation.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: specialist-delegation-token
  namespace: team-alpha
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: specialist-delegation-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: kagent/shared/delegation-token
        property: token
