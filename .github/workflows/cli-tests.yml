name: CLI Tests

on:
  pull_request:
    paths:
      - 'go/core/cli/**'
      - 'go/api/**'
      - '.github/workflows/cli-tests.yml'
  push:
    branches:
      - main
      - eitanya/**

jobs:
  unit-tests:
    name: CLI Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/core/go.mod
          cache-dependency-path: go/core/go.sum

      - name: Run CLI unit tests
        run: make -C go test-cli-unit

      - name: Generate coverage report
        run: |
          cd go/core
          go test -coverprofile=coverage.out ./cli/...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: go/core/coverage.out
          flags: cli-unit
          name: CLI Unit Tests

  integration-tests:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/core/go.mod
          cache-dependency-path: go/core/go.sum

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run CLI integration tests
        run: make -C go test-cli-integration
        env:
          INTEGRATION_TESTS: "true"

  tui-tests:
    name: TUI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/core/go.mod
          cache-dependency-path: go/core/go.sum

      - name: Run TUI tests
        run: make -C go test-tui
        env:
          CI: "true"  # Enforce ASCII color profile for consistent output
