name: Label Enhancement Proposals

on:
  pull_request_target:
    types: [opened, edited, synchronize]

jobs:
  label-by-files:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
