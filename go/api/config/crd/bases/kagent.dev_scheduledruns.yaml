---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: scheduledruns.kagent.dev
spec:
  group: kagent.dev
  names:
    kind: ScheduledRun
    listKind: ScheduledRunList
    plural: scheduledruns
    singular: scheduledrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - jsonPath: .status.lastRunTime
      name: Last Run
      type: date
    - jsonPath: .status.nextRunTime
      name: Next Run
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: ScheduledRun is the Schema for the scheduledruns API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScheduledRunSpec defines the desired state of ScheduledRun.
            properties:
              maxRunHistory:
                default: 10
                description: MaxRunHistory is the maximum number of run history entries
                  to retain.
                maximum: 100
                minimum: 1
                type: integer
              prompt:
                description: Prompt is the text prompt to send to the agent on each
                  run.
                minLength: 1
                type: string
              schedule:
                description: |-
                  Schedule is a cron expression defining when to run the agent. Standard
                  5-field cron syntax (minute hour day-of-month month day-of-week).
                minLength: 1
                type: string
              suspend:
                default: false
                description: |-
                  Suspend pauses automatic scheduling when set to true. Manual triggers
                  are still allowed.
                type: boolean
              targetRef:
                description: |-
                  TargetRef identifies the resource to invoke. The namespace defaults to the
                  ScheduledRun's namespace when omitted. Currently, only kagent.dev Agents
                  and SandboxAgents are supported; the typed reference allows additional
                  target kinds to be added in the future. Cross-namespace references require
                  the target namespace to be watched and the target's allowedNamespaces
                  policy to permit the ScheduledRun's namespace.
                properties:
                  apiGroup:
                    description: |-
                      APIGroup is the group for the resource being referenced.
                      If APIGroup is not specified, the specified Kind must be in the core API group.
                      For any other third-party types, APIGroup is required.
                    type: string
                  kind:
                    description: Kind is the type of resource being referenced
                    type: string
                  name:
                    description: Name is the name of resource being referenced
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of resource being referenced
                      Note that when a namespace is specified, a gateway.networking.k8s.io/ReferenceGrant object is required in the referent namespace to allow that namespace's owner to accept the reference. See the ReferenceGrant documentation for details.
                      (Alpha) This field requires the CrossNamespaceVolumeDataSource feature gate to be enabled.
