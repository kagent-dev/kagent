---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: scheduledruns.kagent.dev
spec:
  group: kagent.dev
  names:
    kind: ScheduledRun
    listKind: ScheduledRunList
    plural: scheduledruns
    singular: scheduledrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspend
      type: boolean
    - jsonPath: .status.lastRunTime
      name: Last Run
      type: date
    - jsonPath: .status.nextRunTime
      name: Next Run
      type: string
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: ScheduledRun is the Schema for the scheduledruns API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ScheduledRunSpec defines the desired state of ScheduledRun.
            properties:
              agentRef:
                description: |-
                  AgentRef is a reference to the Agent to execute. If Namespace is empty
                  it defaults to the ScheduledRun's namespace.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              maxRunHistory:
                default: 10
                description: MaxRunHistory is the maximum number of run history entries
                  to retain.
                maximum: 100
                minimum: 1
                type: integer
              prompt:
                description: Prompt is the text prompt to send to the agent on each
                  run.
                minLength: 1
                type: string
              schedule:
                description: |-
                  Schedule is a cron expression defining when to run the agent. Standard
                  5-field cron syntax (minute hour day-of-month month day-of-week).
                minLength: 1
                type: string
              suspend:
                default: false
                description: |-
                  Suspend pauses cron-driven scheduling when set to true. Manual triggers
                  via the API still execute; Suspend only gates the cron tick path.
                type: boolean
              timeZone:
                description: |-
                  TimeZone is an IANA time zone name (e.g. "America/Los_Angeles") used
                  to interpret Schedule. If empty, the controller process's local time
                  zone (typically UTC in-cluster) is used.
                type: string
            required:
            - agentRef
            - prompt
            - schedule
            type: object
          status:
            description: ScheduledRunStatus defines the observed state of ScheduledRun.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastRunTime:
                format: date-time
                type: string
              nextRunTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              runHistory:
                items:
                  description: |-
                    RunHistoryEntry records one execution of a scheduled run. DispatchStatus
                    is set synchronously when the A2A call returns; Outcome is set
                    asynchronously by polling the session.
                  properties:
                    completionTime:
                      format: date-time
                      type: string
                    dispatchMessage:
                      type: string
                    dispatchStatus:
                      description: |-
                        DispatchStatus reflects whether the A2A SendMessage call to the agent pod
                        succeeded. It says nothing about the LLM result — that lives in [RunOutcome].
                      enum:
                      - Dispatched
                      - DispatchFailed
                      type: string
                    outcome:
                      description: |-
                        RunOutcome reflects the terminal state of the agent run, resolved
                        asynchronously by polling the session's task state after dispatch returns.
                        "Pending" means polling is still in progress (or was abandoned because the
                        controller restarted before the session terminated).
                      enum:
                      - Pending
                      - Succeeded
                      - Failed
                      - Timeout
                      type: string
                    outcomeMessage:
                      type: string
                    outcomeTime:
                      format: date-time
                      type: string
                    sessionId:
                      type: string
                    startTime:
                      format: date-time
                      type: string
                  required:
                  - dispatchStatus
                  - startTime
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
