<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<style>
  :root {
    --background: #ffffff;
    --foreground: #0f172a;
    --card: #ffffff;
    --card-foreground: #0f172a;
    --primary: #7c3aed;
    --primary-hover: #6d28d9;
    --primary-foreground: #f8fafc;
    --secondary: #f1f5f9;
    --secondary-foreground: #1e293b;
    --muted: #f1f5f9;
    --muted-foreground: #64748b;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --input: #e2e8f0;
    --ring: #7c3aed;
    --radius: 10px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f8fafc;
    color: var(--foreground);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  header h1 {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--foreground);
  }

  .header-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  .header-dot.offline {
    background: #f59e0b;
    animation: pulse-amber 2s ease-in-out infinite;
  }

  @keyframes pulse-amber {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #status {
    margin-left: auto;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--muted-foreground);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #board {
    display: flex;
    gap: 14px;
    padding: 20px 1.5rem 1.5rem;
    overflow-x: auto;
    min-height: calc(100vh - 56px);
    align-items: flex-start;
    scroll-snap-type: x proximity;
  }

  .column {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 300px;
    min-width: 300px;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 96px);
    box-shadow: var(--shadow);
    scroll-snap-align: start;
    overflow: hidden;
  }

  .col-header {
    padding: 14px 16px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    user-select: none;
  }

  .col-color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .col-count {
    margin-left: auto;
    background: var(--muted);
    color: var(--muted-foreground);
    border-radius: 9999px;
    min-width: 24px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0 7px;
  }

  .col-body {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    flex: 1;
    background: #fafbfc;
  }

  .col-body:empty::after {
    content: "No tasks";
    display: block;
    text-align: center;
    padding: 32px 16px;
    color: var(--muted-foreground);
    font-size: 0.82rem;
    font-style: italic;
    opacity: 0.6;
  }

  .add-form {
    padding: 12px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
  }

  .add-form input {
    flex: 1;
    border: 1px solid var(--input);
    border-radius: 8px;
    background: var(--background);
    color: var(--foreground);
    padding: 8px 12px;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    font-family: inherit;
  }

  .add-form input::placeholder {
    color: var(--muted-foreground);
    opacity: 0.7;
  }

  .add-form input:focus {
    border-color: var(--ring);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
  }

  .add-form button {
    background: var(--primary);
    color: var(--primary-foreground);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    font-family: inherit;
  }

  .add-form button:hover {
    background: var(--primary-hover);
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    color: var(--card-foreground);
    border-radius: 8px;
    border: 1px solid var(--border);
    padding: 14px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s, border-color 0.15s;
  }

  .card:hover {
    box-shadow: var(--shadow-md);
    border-color: #cbd5e1;
  }

  .card.hitl-active {
    border-left: 3px solid #f59e0b;
  }

  .card-title {
    font-size: 0.9rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--foreground);
    margin-bottom: 2px;
    word-break: break-word;
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--muted-foreground);
    line-height: 1.45;
    margin-top: 4px;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    word-break: break-word;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
  }

  .badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 9999px;
    font-weight: 600;
    line-height: 1.6;
    white-space: nowrap;
  }

  .badge-assignee {
    background: #eff6ff;
    color: #1d4ed8;
    border: 1px solid #bfdbfe;
  }

  .badge-hitl {
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fde68a;
  }

  .badge-sub {
    background: #f0fdf4;
    color: #166534;
    border: 1px solid #bbf7d0;
  }

  .badge-id {
    background: var(--muted);
    color: var(--muted-foreground);
    border: 1px solid var(--border);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  /* ── Subtasks ── */
  .subtasks-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-light);
  }

  .subtasks-header {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .subtasks-progress {
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--muted-foreground);
  }

  .subtask-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .subtask-item {
    font-size: 0.8rem;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    background: var(--muted);
    color: var(--secondary-foreground);
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }

  .subtask-item:hover {
    background: #e8edf3;
    border-color: var(--border);
  }

  .subtask-item.done {
    background: #f0fdf4;
    border-color: #bbf7d0;
  }

  .subtask-item.done .subtask-title {
    text-decoration: line-through;
    color: var(--muted-foreground);
    opacity: 0.7;
  }

  .subtask-checkbox {
    appearance: none;
    -webkit-appearance: none;
    width: 15px;
    height: 15px;
    min-width: 15px;
    border: 1.5px solid #94a3b8;
    border-radius: 4px;
    background: var(--background);
    cursor: pointer;
    margin-top: 1px;
    position: relative;
    transition: background 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }

  .subtask-checkbox:checked {
    background: #22c55e;
    border-color: #22c55e;
  }

  .subtask-checkbox:checked::after {
    content: "";
    position: absolute;
    left: 3px;
    top: 0px;
    width: 5px;
    height: 9px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  .subtask-title {
    flex: 1;
    min-width: 0;
    line-height: 1.4;
    word-break: break-word;
  }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 9999px;
    margin-top: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: #22c55e;
    border-radius: 9999px;
    transition: width 0.3s ease;
  }

  /* ── Card Actions ── */
  .card-actions {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-light);
  }

  .btn-hitl {
    background: var(--background);
    border: 1px solid var(--input);
    color: var(--muted-foreground);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    font-family: inherit;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .btn-hitl:hover {
    background: var(--muted);
    border-color: #cbd5e1;
  }

  .btn-hitl.active {
    background: #fef3c7;
    border-color: #fde68a;
    color: #92400e;
  }

  .btn-hitl.active:hover {
    background: #fde68a;
  }

  /* ── Column color themes ── */
  .col-inbox .col-color-dot { background: #64748b; }
  .col-design .col-color-dot { background: #8b5cf6; }
  .col-develop .col-color-dot { background: #3b82f6; }
  .col-testing .col-color-dot { background: #f59e0b; }
  .col-securityscan .col-color-dot { background: #ef4444; }
  .col-codereview .col-color-dot { background: #ec4899; }
  .col-documentation .col-color-dot { background: #06b6d4; }
  .col-done .col-color-dot { background: #22c55e; }

  .col-inbox .col-header { border-top: 3px solid #64748b; }
  .col-design .col-header { border-top: 3px solid #8b5cf6; }
  .col-develop .col-header { border-top: 3px solid #3b82f6; }
  .col-testing .col-header { border-top: 3px solid #f59e0b; }
  .col-securityscan .col-header { border-top: 3px solid #ef4444; }
  .col-codereview .col-header { border-top: 3px solid #ec4899; }
  .col-documentation .col-header { border-top: 3px solid #06b6d4; }
  .col-done .col-header { border-top: 3px solid #22c55e; }

  .col-done .card-title {
    text-decoration: line-through;
    opacity: 0.6;
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    header {
      padding: 0 1rem;
      height: 50px;
    }

    #board {
      padding: 14px 1rem 1rem;
      gap: 10px;
    }

    .column {
      width: min(85vw, 310px);
      min-width: min(85vw, 310px);
    }
  }

  /* ── Scrollbar ── */
  .col-body::-webkit-scrollbar {
    width: 4px;
  }

  .col-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .col-body::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 4px;
  }

  #board::-webkit-scrollbar {
    height: 6px;
  }

  #board::-webkit-scrollbar-track {
    background: transparent;
  }

  #board::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 6px;
  }
</style>
</head>
<body>
<header>
  <h1>Kanban Board</h1>
  <span id="status"><span class="header-dot" id="status-dot"></span> connecting…</span>
</header>
<div id="board"></div>
<script>
(function() {
  var WORKFLOW = ["Inbox","Design","Develop","Testing","SecurityScan","CodeReview","Documentation","Done"];

  var COL_LABELS = {
    Inbox: "Inbox",
    Design: "Design",
    Develop: "Develop",
    Testing: "Testing",
    SecurityScan: "Security Scan",
    CodeReview: "Code Review",
    Documentation: "Documentation",
    Done: "Done"
  };

  function norm(task) {
    return {
      id: task.id || task.ID,
      title: task.title || task.Title || "",
      description: task.description || task.Description || "",
      status: task.status || task.Status || "",
      assignee: task.assignee || task.Assignee || "",
      user_input_needed: task.user_input_needed || task.UserInputNeeded || false,
      parent_id: task.parent_id || task.ParentID || null,
      subtasks: (task.subtasks || task.Subtasks || []).map(norm)
    };
  }

  function renderCard(rawTask) {
    var task = norm(rawTask);
    var div = document.createElement("div");
    div.className = "card" + (task.user_input_needed ? " hitl-active" : "");
    div.dataset.id = task.id;

    var titleEl = document.createElement("div");
    titleEl.className = "card-title";
    titleEl.textContent = task.title || "(untitled)";
    div.appendChild(titleEl);

    if (task.description) {
      var descEl = document.createElement("div");
      descEl.className = "card-desc";
      descEl.textContent = task.description;
      div.appendChild(descEl);
    }

    var meta = document.createElement("div");
    meta.className = "card-meta";
    var hasAnyMeta = false;

    var idBadge = document.createElement("span");
    idBadge.className = "badge badge-id";
    idBadge.textContent = "#" + task.id;
    meta.appendChild(idBadge);
    hasAnyMeta = true;

    if (task.assignee) {
      var ab = document.createElement("span");
      ab.className = "badge badge-assignee";
      ab.textContent = task.assignee;
      meta.appendChild(ab);
      hasAnyMeta = true;
    }
    if (task.user_input_needed) {
      var hb = document.createElement("span");
      hb.className = "badge badge-hitl";
      hb.textContent = "Input Needed";
      meta.appendChild(hb);
      hasAnyMeta = true;
    }
    var subs = task.subtasks || [];
    var doneSubs = subs.filter(function(s) { return s.status === "Done"; }).length;
    if (subs.length > 0) {
      var sb = document.createElement("span");
      sb.className = "badge badge-sub";
      sb.textContent = doneSubs + "/" + subs.length + " subtasks";
      meta.appendChild(sb);
      hasAnyMeta = true;
    }
    if (hasAnyMeta) div.appendChild(meta);

    if (subs.length > 0) {
      var section = document.createElement("div");
      section.className = "subtasks-section";

      var hdr = document.createElement("div");
      hdr.className = "subtasks-header";
      var hdrLabel = document.createElement("span");
      hdrLabel.textContent = "Subtasks";
      hdr.appendChild(hdrLabel);
      var hdrProgress = document.createElement("span");
      hdrProgress.className = "subtasks-progress";
      hdrProgress.textContent = doneSubs + " / " + subs.length + " done";
      hdr.appendChild(hdrProgress);
      section.appendChild(hdr);

      var subList = document.createElement("div");
      subList.className = "subtask-list";
      subs.forEach(function(st) {
        var isDone = st.status === "Done";
        var item = document.createElement("label");
        item.className = "subtask-item" + (isDone ? " done" : "");

        var cb = document.createElement("input");
        cb.type = "checkbox";
        cb.className = "subtask-checkbox";
        cb.checked = isDone;
        cb.addEventListener("change", function(e) {
          e.stopPropagation();
          var newStatus = cb.checked ? "Done" : "Inbox";
          fetch("/api/tasks/" + st.id, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({status: newStatus})
          }).catch(function(err) { console.error("subtask toggle:", err); });
        });
        item.appendChild(cb);

        var t = document.createElement("span");
        t.className = "subtask-title";
        t.textContent = st.title;
        item.appendChild(t);

        subList.appendChild(item);
      });
      section.appendChild(subList);

      var barWrap = document.createElement("div");
      barWrap.className = "progress-bar-wrap";
      var barFill = document.createElement("div");
      barFill.className = "progress-bar-fill";
      barFill.style.width = (subs.length > 0 ? Math.round(doneSubs / subs.length * 100) : 0) + "%";
      barWrap.appendChild(barFill);
      section.appendChild(barWrap);

      div.appendChild(section);
    }

    var actions = document.createElement("div");
    actions.className = "card-actions";

    var hitlBtn = document.createElement("button");
    hitlBtn.className = "btn-hitl" + (task.user_input_needed ? " active" : "");
    hitlBtn.title = task.user_input_needed ? "Clear input-needed flag" : "Flag as needing input";
    hitlBtn.innerHTML = task.user_input_needed
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Done'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> Flag';
    hitlBtn.addEventListener("click", function() { toggleHITL(task.id, task.user_input_needed); });
    actions.appendChild(hitlBtn);

    div.appendChild(actions);
    return div;
  }

  function renderBoard(board) {
    var container = document.getElementById("board");
    container.innerHTML = "";
    var columns = board.columns || [];
    var colMap = {};
    columns.forEach(function(c) { colMap[c.status] = c; });

    WORKFLOW.forEach(function(status) {
      var col = colMap[status] || {status: status, tasks: []};
      var tasks = col.tasks || [];

      var colEl = document.createElement("div");
      colEl.className = "column col-" + status.toLowerCase();

      var header = document.createElement("div");
      header.className = "col-header";
      var dot = document.createElement("span");
      dot.className = "col-color-dot";
      header.appendChild(dot);
      var nameEl = document.createElement("span");
      nameEl.textContent = COL_LABELS[status] || status;
      header.appendChild(nameEl);
      var countEl = document.createElement("span");
      countEl.className = "col-count";
      countEl.textContent = tasks.length;
      header.appendChild(countEl);
      colEl.appendChild(header);

      if (status === "Inbox") {
        var form = document.createElement("div");
        form.className = "add-form";
        var inp = document.createElement("input");
        inp.type = "text";
        inp.placeholder = "Add a task…";
        inp.id = "inbox-input";
        var btn = document.createElement("button");
        btn.textContent = "Add";
        btn.addEventListener("click", function() {
          var title = inp.value.trim();
          if (!title) return;
          addTask(title);
          inp.value = "";
        });
        inp.addEventListener("keydown", function(e) {
          if (e.key === "Enter") { btn.click(); }
        });
        form.appendChild(inp);
        form.appendChild(btn);
        colEl.appendChild(form);
      }

      var body = document.createElement("div");
      body.className = "col-body";
      tasks.forEach(function(t) { body.appendChild(renderCard(t)); });
      colEl.appendChild(body);

      container.appendChild(colEl);
    });
  }

  function setLiveStatus(live) {
    var statusEl = document.getElementById("status");
    var dot = document.getElementById("status-dot");
    if (live) {
      statusEl.innerHTML = '';
      dot = document.createElement("span");
      dot.className = "header-dot";
      dot.id = "status-dot";
      statusEl.appendChild(dot);
      statusEl.appendChild(document.createTextNode(" live"));
    } else {
      statusEl.innerHTML = '';
      dot = document.createElement("span");
      dot.className = "header-dot offline";
      dot.id = "status-dot";
      statusEl.appendChild(dot);
      statusEl.appendChild(document.createTextNode(" reconnecting…"));
    }
  }

  function fetchBoard() {
    fetch("/api/board")
      .then(function(r) { return r.json(); })
      .then(renderBoard)
      .catch(function(e) { console.error("fetchBoard:", e); });
  }

  function toggleHITL(id, current) {
    fetch("/api/tasks/" + id, {
      method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({user_input_needed: !current})
    }).catch(function(e) { console.error("toggleHITL:", e); });
  }

  function addTask(title) {
    fetch("/api/tasks", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({title: title, status: "Inbox"})
    }).catch(function(e) { console.error("addTask:", e); });
  }

  function connectSSE() {
    var es = new EventSource("/events");

    es.addEventListener("snapshot", function(e) {
      setLiveStatus(true);
      try {
        var ev = JSON.parse(e.data);
        if (ev.data && ev.data.columns) renderBoard(ev.data);
        else fetchBoard();
      } catch(_) { fetchBoard(); }
    });

    es.onmessage = function(e) {
      try {
        var ev = JSON.parse(e.data);
        if (ev.data && ev.data.columns) renderBoard(ev.data);
        else fetchBoard();
      } catch(_) { fetchBoard(); }
    };

    es.onerror = function() {
      setLiveStatus(false);
    };

    es.onopen = function() {
      setLiveStatus(true);
    };
  }

  fetchBoard();
  connectSSE();
})();
</script>
