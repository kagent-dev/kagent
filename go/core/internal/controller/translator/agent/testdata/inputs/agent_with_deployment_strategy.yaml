operation: translateAgent
targetObject: agent-with-deployment-strategy
namespace: test
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: openai-secret
      namespace: test
    data:
      api-key: c2stdGVzdC1hcGkta2V5  # base64 encoded "sk-test-api-key"
  - apiVersion: kagent.dev/v1alpha2
    kind: ModelConfig
    metadata:
      name: basic-model
      namespace: test
    spec:
      provider: OpenAI
      model: gpt-4o
      apiKeySecret: openai-secret
      apiKeySecretKey: api-key
  - apiVersion: kagent.dev/v1alpha2
    kind: Agent
    metadata:
      name: agent-with-deployment-strategy
      namespace: test
    spec:
      type: Declarative
      declarative:
        description: A test agent with a Recreate deployment strategy
        systemMessage: You are a helpful assistant.
        modelConfig: basic-model
        deployment:
          deploymentStrategy:
            type: Recreate
        tools: []
