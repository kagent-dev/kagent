operation: translateAgent
targetObject: agent-cross-provider-memory
namespace: test
objects:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: openai-secret
      namespace: test
    data:
      api-key: c2stdGVzdC1hcGkta2V5
  - apiVersion: kagent.dev/v1alpha2
    kind: ModelConfig
    metadata:
      name: openai-llm
      namespace: test
    spec:
      provider: OpenAI
      model: gpt-4o
      apiKeySecret: openai-secret
      apiKeySecretKey: api-key
  - apiVersion: kagent.dev/v1alpha2
    kind: ModelConfig
    metadata:
      name: openai-embedding
      namespace: test
    spec:
      provider: OpenAI
      model: text-embedding-3-small
      apiKeySecret: openai-secret
      apiKeySecretKey: api-key
  - apiVersion: kagent.dev/v1alpha2
    kind: Agent
    metadata:
      name: agent-cross-provider-memory
      namespace: test
    spec:
      type: Declarative
      declarative:
        systemMessage: You are an assistant.
        modelConfig: openai-llm
        memory:
          modelConfig: openai-embedding
        tools: []
