apiVersion: v2
name: kagent-crds
description: CRDs for kagent
type: application
version: ${VERSION}
dependencies:
  - name: kmcp-crds
    version: ${KMCP_VERSION}
    repository: oci://ghcr.io/kagent-dev/kmcp/helm
    condition: kmcp.enabled
  - name: substrate-crds
    version: ${SUBSTRATE_VERSION}
    repository: ${SUBSTRATE_REPO}
    condition: substrate.enabled
