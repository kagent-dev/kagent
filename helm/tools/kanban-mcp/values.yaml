replicas: 1

image:
  registry: localhost:5001
  repository: kagent-dev/kagent/kanban-mcp
  pullPolicy: Always
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext: {}

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

args: []

volumes: []

volumeMounts: []

config:
  KANBAN_ADDR: ":8080"
  KANBAN_TRANSPORT: "http"
  KANBAN_DB_TYPE: "sqlite"
  KANBAN_DB_PATH: "/data/kanban.db"
  KANBAN_LOG_LEVEL: "info"
