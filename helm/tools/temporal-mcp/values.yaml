replicas: 1

image:
  registry: localhost:5001
  repository: kagent-dev/kagent/temporal-mcp
  pullPolicy: Always
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext: {}

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

args: []

volumes: []

volumeMounts: []

config:
  TEMPORAL_ADDR: ":8080"
  TEMPORAL_TRANSPORT: "http"
  TEMPORAL_HOST_PORT: "temporal-server:7233"
  TEMPORAL_NAMESPACE: "kagent"
  TEMPORAL_POLL_INTERVAL: "5s"
  TEMPORAL_LOG_LEVEL: "info"
