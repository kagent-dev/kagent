replicas: 1

image:
  registry: ghcr.io
  repository: kagent-dev/doc2vec/mcp
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  # A fixed non-root UID/GID is set so the chart installs on vanilla Kubernetes:
  # runAsNonRoot (in podSecurityContext) needs a numeric non-root user, and the
  # querydoc image (doc2vec/mcp) does not currently run as one. Once that image
  # ships a numeric non-root USER, this pin can be dropped and kubelet will read
  # the UID from the image. On OpenShift, where the restricted-v2 SCC assigns a
  # per-namespace UID range and rejects a pinned UID outside it, override these
  # to null so the SCC injects an in-range UID:
  #   --set tools.querydoc.securityContext.runAsUser=null
  #   --set tools.querydoc.securityContext.runAsGroup=null
  runAsUser: 14000
  runAsGroup: 14000

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

logLevel: info

# MCP server configuration
config:

# Secret configuration
openai:
  apiKey: ""
  # secretRef: ""  # Name of existing Secret containing OPENAI_API_KEY. Takes precedence over apiKey.

# OTEL configuration
otel:
  tracing:
    enabled: false
    exporter:
      otlp:
        endpoint: ""
        timeout: 10000
        insecure: true
