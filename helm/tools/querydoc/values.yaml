replicas: 1

image:
  registry: ghcr.io
  repository: kagent-dev/doc2vec/mcp
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  # runAsUser / runAsGroup are left unset so the chart installs on OpenShift,
  # where the restricted-v2 SCC assigns a per-namespace UID range and rejects a
  # pinned UID outside it. runAsNonRoot (in podSecurityContext) enforces
  # non-root: with runAsUser unset the container runs as the image's USER, so
  # the mcp/querydoc image must ship a non-root USER or the pod will fail to
  # start. Set a fixed UID below on clusters that allow it:
  # runAsUser: 14000
  # runAsGroup: 14000

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

logLevel: info

# MCP server configuration
config:

# Secret configuration
openai:
  apiKey: ""
  # secretRef: ""  # Name of existing Secret containing OPENAI_API_KEY. Takes precedence over apiKey.

# OTEL configuration
otel:
  tracing:
    enabled: false
    exporter:
      otlp:
        endpoint: ""
        timeout: 10000
        insecure: true
