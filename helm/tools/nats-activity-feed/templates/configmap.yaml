apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nats-activity-feed.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nats-activity-feed.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.config }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
