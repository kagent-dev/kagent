replicas: 1

image:
  registry: localhost:5001
  repository: kagent-dev/kagent/cron-mcp
  pullPolicy: Always
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext: {}

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

args: []

volumes: []

volumeMounts: []

config:
  CRON_ADDR: ":8080"
  CRON_TRANSPORT: "http"
  CRON_DB_TYPE: "sqlite"
  CRON_DB_PATH: "/data/cron.db"
  CRON_LOG_LEVEL: "info"
  CRON_SHELL: "/bin/sh"
