replicas: 1

image:
  registry: localhost:5001
  repository: kagent-dev/kagent/gitrepo-mcp
  pullPolicy: Always
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

securityContext: {}

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

args:
  - serve

volumes: []

volumeMounts: []

config:
  GITREPO_ADDR: ":8080"
  GITREPO_TRANSPORT: "http"
  GITREPO_DATA_DIR: "/data"

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessMode: ReadWriteOnce

cronJob:
  enabled: false
  schedule: "0 */6 * * *"
  image: curlimages/curl:8.5.0
