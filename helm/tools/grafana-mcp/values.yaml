replicas: 1

grafana:
  url: "grafana.kagent:3000/api"
  serviceAccountToken: ""
  # apiKey: "" # Deprecated - use serviceAccountToken instead.
  # secretRef: ""  # Name of Secret to reference (contains GRAFANA_SERVICE_ACCOUNT_TOKEN or GRAFANA_API_KEY)

image:
  registry: mcp
  repository: grafana
  pullPolicy: Always
  tag: "latest" # Only latest is available via docker hub at present. See https://github.com/grafana/mcp-grafana/issues/180

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsUser: 1000
  runAsGroup: 999

tolerations: []

nodeSelector: {}

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# allowedHosts configures the --allowed-hosts argument for mcp-grafana's Host header
# validation (required for streamable-http transport). When empty, defaults to the
# standard Kubernetes Service DNS variants (<name>.<namespace>, <name>.<namespace>.svc,
# <name>.<namespace>.svc.cluster.local, localhost). Override with a list of hosts or
# set to ["*"] to allow all hosts.
allowedHosts: []

# Additional Arguments for the mcp server
args: []

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Deployment configuration - used to populate the ConfigMap template.
# Add custom configuration values here as needed.
config:
