{{- define "cilium-manager.rules" -}}
# Access to Cilium CRDs for management and monitoring
- apiGroups:
    - 'cilium.io'
  resources:
    - '*'
  verbs:
    - "*"

# Access to core resources for pod/node management
- apiGroups:
    - ''
  resources:
    - 'pods'
    - 'nodes'
    - 'namespaces'
    - 'services'
    - 'endpoints'
    - 'componentstatuses'
  verbs:
    - "*"

# Access to logs for troubleshooting
- apiGroups:
    - ''
  resources:
    - 'pods/log'
    - 'pods/exec'
  verbs:
    - "*"

# Access to deployments and daemonsets for installation/upgrade
- apiGroups:
    - 'apps'
  resources:
    - 'deployments'
    - 'daemonsets'
    - 'statefulsets'
    - 'replicasets'
  verbs:
    - "*"

# Access to networking resources
- apiGroups:
    - 'networking.k8s.io'
  resources:
    - 'networkpolicies'
    - 'ingresses'
  verbs:
    - "*"

# Access to apiextensions for CRD management
- apiGroups:
    - 'apiextensions.k8s.io'
  resources:
    - 'customresourcedefinitions'
  verbs:
    - "*"

# Access to helm releases for installation management
- apiGroups:
    - 'helm.toolkit.fluxcd.io'
  resources:
    - 'helmreleases'
  verbs:
    - "*"
{{- end -}}

{{- $create := true }}
{{- if and (hasKey .Values "rbac") (hasKey .Values.rbac "create") }}{{ $create = .Values.rbac.create }}{{ end }}
{{- if and (hasKey .Values "global") (hasKey .Values.global "rbac") (hasKey .Values.global.rbac "create") }}{{ $create = .Values.global.rbac.create }}{{ end }}

{{- if $create }}
{{- $clusterScoped := true }}
{{- if and (hasKey .Values "rbac") (hasKey .Values.rbac "clusterScoped") }}{{ $clusterScoped = .Values.rbac.clusterScoped }}{{ end }}
{{- if and (hasKey .Values "global") (hasKey .Values.global "rbac") (hasKey .Values.global.rbac "clusterScoped") }}{{ $clusterScoped = .Values.global.rbac.clusterScoped }}{{ end }}

{{- $namespaces := list .Release.Namespace }}
{{- if and (hasKey .Values "rbac") (hasKey .Values.rbac "namespaces") }}{{ $namespaces = .Values.rbac.namespaces }}{{ end }}
{{- if and (hasKey .Values "global") (hasKey .Values.global "rbac") (hasKey .Values.global.rbac "namespaces") }}{{ $namespaces = .Values.global.rbac.namespaces }}{{ end }}
{{- if empty $namespaces }}{{ $namespaces = list .Release.Namespace }}{{ end }}

{{- if $clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-cilium-manager-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
  {{- include "cilium-manager.rules" . | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-cilium-manager-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-cilium-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ include "kagent.namespace" . }}
{{- else }}
{{- range $namespace := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kagent.fullname" $ }}-cilium-manager-role
  namespace: {{ $namespace }}
  labels:
    {{- include "kagent.labels" $ | nindent 4 }}
rules:
  {{- include "cilium-manager.rules" $ | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kagent.fullname" $ }}-cilium-manager-rolebinding
  namespace: {{ $namespace }}
  labels:
    {{- include "kagent.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kagent.fullname" $ }}-cilium-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
