# -- Optional reference to a ModelConfig resource for this agent. If not specified, the default model config will be used.
modelConfigRef: ""

# -- Optional runtime specification for the agent. If not specified, it will default to "python". Supported runtimes include "python" and "go".
runtime: ""

imagePullSecrets: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

compaction: {}

# -- Optional Prometheus server URL (e.g. "http://prometheus:9090"). When set, it is injected
# into the agent's system message so the agent knows which Prometheus endpoint to use.
prometheus:
  url: ""
