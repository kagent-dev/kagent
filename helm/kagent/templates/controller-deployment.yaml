{{- $externalBearerEnabled := eq (.Values.controller.auth.mode | default "unsecure") "external-bearer" -}}
{{- $externalBearerPolicy := .Values.controller.auth.externalBearer.policy -}}
{{- $externalBearerPolicyEnabled := and $externalBearerEnabled (or $externalBearerPolicy.inline $externalBearerPolicy.existingConfigMap.name) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent.fullname" . }}-controller
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "kagent.controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap: {{ include (print $.Template.BasePath "/controller-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/postgresql-secret.yaml") . | sha256sum }}
        {{- if and $externalBearerEnabled $externalBearerPolicy.inline }}
        checksum/external-bearer-policy: {{ include (print $.Template.BasePath "/external-bearer-policy-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.controller.podAnnotations | default .Values.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kagent.controller.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.controller.imagePullSecrets | default .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.controller.podSecurityContext | default .Values.podSecurityContext) }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kagent.fullname" . }}-controller
      {{- if or (gt (len .Values.controller.volumes) 0) $externalBearerPolicyEnabled }}
      volumes:
      {{- with .Values.controller.volumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- if $externalBearerPolicyEnabled }}
      - name: external-bearer-policy
        configMap:
          name: {{ default (printf "%s-external-bearer-policy" (include "kagent.fullname" .)) $externalBearerPolicy.existingConfigMap.name | quote }}
          items:
            - key: {{ default "policy.json" $externalBearerPolicy.existingConfigMap.key | quote }}
              path: policy.json
      {{- end }}
      {{- end }}
      {{- with .Values.controller.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controller.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.controller.image.registry | default .Values.registry  }}/{{ .Values.controller.image.repository }}:{{ coalesce .Values.tag .Values.controller.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy | default .Values.imagePullPolicy }}
          env:
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: AUTH_MODE
              value: {{ .Values.controller.auth.mode | default "unsecure" | quote }}
            {{- if .Values.controller.auth.userIdClaim }}
            - name: AUTH_USER_ID_CLAIM
              value: {{ .Values.controller.auth.userIdClaim | quote }}
            {{- end }}
            {{- if $externalBearerEnabled }}
            {{- with .Values.controller.auth.externalBearer.url }}
            - name: AUTH_EXTERNAL_BEARER_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.auth.externalBearer.timeout }}
            - name: AUTH_EXTERNAL_BEARER_TIMEOUT
              value: {{ . | quote }}
            {{- end }}
            {{- if .Values.controller.auth.externalBearer.propagateToken }}
            - name: AUTH_EXTERNAL_BEARER_PROPAGATE_TOKEN
              value: "true"
            {{- end }}
            {{- with .Values.controller.auth.externalBearer.validationAuthorization.secretRef }}
            {{- if and .name .key }}
            - name: AUTH_EXTERNAL_BEARER_VALIDATION_AUTHORIZATION
              valueFrom:
                secretKeyRef:
                  name: {{ .name | quote }}
                  key: {{ .key | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.controller.auth.externalBearer.clientId }}
            - name: AUTH_EXTERNAL_BEARER_CLIENT_ID
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.controller.auth.externalBearer.clientSecret.secretRef }}
            {{- if and .name .key }}
            - name: AUTH_EXTERNAL_BEARER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .name | quote }}
                  key: {{ .key | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.controller.auth.externalBearer.allowUnauthenticatedIntrospection }}
            - name: AUTH_EXTERNAL_BEARER_ALLOW_UNAUTHENTICATED_INTROSPECTION
              value: "true"
            {{- end }}
            {{- if $externalBearerPolicyEnabled }}
            - name: AUTH_EXTERNAL_BEARER_POLICY_FILE
              value: "/etc/kagent/external-bearer/policy.json"
            {{- end }}
            {{- end }}
            {{- if .Values.database.postgres.urlFile }}
            - name: POSTGRES_DATABASE_URL_FILE
              value: {{ .Values.database.postgres.urlFile | quote }}
            {{- else if .Values.database.postgres.url }}
            - name: POSTGRES_DATABASE_URL
              value: {{ .Values.database.postgres.url | quote }}
            {{- else if .Values.database.postgres.bundled.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kagent.passwordSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DATABASE_URL
              value: {{ printf "postgres://kagent:$(POSTGRES_PASSWORD)@%s.%s.svc.cluster.local:5432/kagent?sslmode=disable" (include "kagent.postgresqlServiceName" .) (include "kagent.namespace" .) | quote }}
            {{- else }}
            {{ fail "No database connection configured. Set database.postgres.url, database.postgres.urlFile, or enable database.postgres.bundled." }}
            {{- end }}
            {{- with .Values.controller.env }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "kagent.fullname" . }}-controller
            {{- with .Values.controller.envFrom }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.controller.service.ports.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          {{- with (.Values.controller.securityContext | default .Values.securityContext) }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
          {{- if or (gt (len .Values.controller.volumeMounts) 0) $externalBearerPolicyEnabled }}
          volumeMounts:
            {{- with .Values.controller.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if $externalBearerPolicyEnabled }}
            - name: external-bearer-policy
              mountPath: /etc/kagent/external-bearer
              readOnly: true
            {{- end }}
          {{- end }}
