apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-getter-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
- apiGroups:
  - kagent.dev
  resources:
  - agentcronjobs
  - agents
  - modelconfigs
  - modelproviderconfigs
  - toolservers
  - memories
  - remotemcpservers
  - mcpservers
  - workflowtemplates
  - workflowruns
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kagent.dev
  resources:
  - agentcronjobs/finalizers
  - agents/finalizers
  - modelconfigs/finalizers
  - modelproviderconfigs/finalizers
  - toolservers/finalizers
  - memories/finalizers
  - remotemcpservers/finalizers
  - mcpservers/finalizers
  - workflowtemplates/finalizers
  - workflowruns/finalizers
  verbs:
  - update
- apiGroups:
  - kagent.dev
  resources:
  - agentcronjobs/status
  - agents/status
  - modelconfigs/status
  - modelproviderconfigs/status
  - toolservers/status
  - memories/status
  - remotemcpservers/status
  - mcpservers/status
  - workflowtemplates/status
  - workflowruns/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - ""
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "apps"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "batch"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "apiextensions.k8s.io"
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io/v1
  resources:
  - "*"
  verbs:
  - get
  - list
  - watch
---

