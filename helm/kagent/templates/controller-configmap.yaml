apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kagent.fullname" . }}-controller
  namespace: {{ include "kagent.namespace" . }}
  labels:
    {{- include "kagent.controller.labels" . | nindent 4 }}
data:
  A2A_BASE_URL: {{ include "kagent.a2aBaseUrl" . | quote }}
  DEFAULT_MODEL_CONFIG_NAME: {{ include "kagent.defaultModelConfigName" . | quote }}
  KAGENT_CONTROLLER_NAME: {{ include "kagent.fullname" . }}-controller
  {{- if .Values.ui.externalUrl }}
  KAGENT_UI_URL: {{ .Values.ui.externalUrl | quote }}
  {{- end }}
  IMAGE_PULL_POLICY: {{ .Values.controller.agentImage.pullPolicy | default .Values.imagePullPolicy | quote }}
  {{- if and .Values.controller.agentImage.pullSecret (not (eq .Values.controller.agentImage.pullSecret "")) }}
  IMAGE_PULL_SECRET: {{ .Values.controller.agentImage.pullSecret | quote }}
  {{- end }}
  IMAGE_REGISTRY: {{ .Values.controller.agentImage.registry | default .Values.registry  | quote }}
  IMAGE_REPOSITORY: {{ .Values.controller.agentImage.repository | quote }}
  IMAGE_TAG: {{ coalesce .Values.controller.agentImage.tag .Values.tag .Chart.Version | quote }}
  SKILLS_INIT_IMAGE_PULL_POLICY: {{ .Values.controller.skillsInitImage.pullPolicy | default .Values.imagePullPolicy | quote }}
  SKILLS_INIT_IMAGE_REGISTRY: {{ .Values.controller.skillsInitImage.registry | default .Values.registry | quote }}
  SKILLS_INIT_IMAGE_REPOSITORY: {{ .Values.controller.skillsInitImage.repository | quote }}
  SKILLS_INIT_IMAGE_TAG: {{ coalesce .Values.controller.skillsInitImage.tag .Values.tag .Chart.Version | quote }}
  GO_IMAGE_PULL_POLICY: {{ .Values.controller.goAgentImage.pullPolicy | default .Values.imagePullPolicy | quote }}
  GO_IMAGE_REGISTRY: {{ .Values.controller.goAgentImage.registry | default .Values.registry | quote }}
  GO_IMAGE_REPOSITORY: {{ .Values.controller.goAgentImage.repository | quote }}
  GO_IMAGE_TAG: {{ coalesce .Values.controller.goAgentImage.tag .Values.tag .Chart.Version | quote }}
  LEADER_ELECT: {{ include "kagent.leaderElectionEnabled" . | quote }}
  # OpenTelemetry Configuration
  OTEL_TRACING_ENABLED: {{ .Values.otel.tracing.enabled | quote }}
  OTEL_LOGGING_ENABLED: {{ .Values.otel.logging.enabled | quote }}
  {{- $tracesEndpoint := .Values.otel.tracing.exporter.otlp.endpoint }}
  {{- $logsEndpoint := .Values.otel.logging.exporter.otlp.endpoint }}
  {{- if and $tracesEndpoint $logsEndpoint (eq $tracesEndpoint $logsEndpoint) }}
  # Using unified OTEL endpoint (same for traces and logs)
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ $tracesEndpoint | quote }}
  OTEL_EXPORTER_OTLP_TRACES_INSECURE: {{ .Values.otel.tracing.exporter.otlp.insecure | quote }}
  OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: {{ .Values.otel.tracing.exporter.otlp.timeout | quote }}
  OTEL_EXPORTER_OTLP_LOGS_INSECURE: {{ .Values.otel.logging.exporter.otlp.insecure | quote }}
  OTEL_EXPORTER_OTLP_LOGS_TIMEOUT: {{ .Values.otel.logging.exporter.otlp.timeout | quote }}
  OTEL_EXPORTER_OTLP_PROTOCOL: {{ .Values.otel.tracing.exporter.otlp.protocol | quote }}
  {{- else }}
  # Using separate endpoints for traces and logs
  {{- if $tracesEndpoint }}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: {{ $tracesEndpoint | quote }}
  OTEL_EXPORTER_OTLP_TRACES_INSECURE: {{ .Values.otel.tracing.exporter.otlp.insecure | quote }}
  OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: {{ .Values.otel.tracing.exporter.otlp.protocol | quote }}
  OTEL_EXPORTER_OTLP_TRACES_TIMEOUT: {{ .Values.otel.tracing.exporter.otlp.timeout | quote }}
  {{- end }}
  {{- if $logsEndpoint }}
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: {{ $logsEndpoint | quote }}
  OTEL_EXPORTER_OTLP_LOGS_INSECURE: {{ .Values.otel.logging.exporter.otlp.insecure | quote }}
  OTEL_EXPORTER_OTLP_LOGS_TIMEOUT: {{ .Values.otel.logging.exporter.otlp.timeout | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.otel.tracing.exporter.otlp.headers }}
  {{- $traceHeaders := list }}
  {{- range $k := keys .Values.otel.tracing.exporter.otlp.headers | sortAlpha }}
  {{- $traceHeaders = append $traceHeaders (printf "%s=%s" $k (index $.Values.otel.tracing.exporter.otlp.headers $k | toString)) }}
  {{- end }}
  OTEL_EXPORTER_OTLP_TRACES_HEADERS: {{ join "," $traceHeaders | quote }}
  {{- end }}
  {{- if .Values.otel.logging.exporter.otlp.headers }}
  {{- $logHeaders := list }}
  {{- range $k := keys .Values.otel.logging.exporter.otlp.headers | sortAlpha }}
  {{- $logHeaders = append $logHeaders (printf "%s=%s" $k (index $.Values.otel.logging.exporter.otlp.headers $k | toString)) }}
  {{- end }}
  OTEL_EXPORTER_OTLP_LOGS_HEADERS: {{ join "," $logHeaders | quote }}
  {{- end }}
  {{- if .Values.otel.serviceName }}
  OTEL_SERVICE_NAME: {{ .Values.otel.serviceName | quote }}
  {{- end }}
  {{- if .Values.otel.resourceAttributes }}
  {{- $resourceAttrs := list }}
  {{- range $k := keys .Values.otel.resourceAttributes | sortAlpha }}
  {{- $resourceAttrs = append $resourceAttrs (printf "%s=%s" $k (index $.Values.otel.resourceAttributes $k | toString)) }}
  {{- end }}
  OTEL_RESOURCE_ATTRIBUTES: {{ join "," $resourceAttrs | quote }}
  {{- end }}
  {{- if .Values.proxy.url }}
  PROXY_URL: {{ .Values.proxy.url | quote }}
  {{- end }}
  DATABASE_VECTOR_ENABLED: {{ .Values.database.postgres.vectorEnabled | quote }}
  SKIP_MIGRATIONS: {{ .Values.database.postgres.skipMigrations | default false | quote }}
  WATCH_NAMESPACES: {{ include "kagent.watchNamespaces" . | quote }}
  MCP_EGRESS_PLAINTEXT: {{ .Values.controller.mcpEgressPlaintext | default false | quote }}
  {{- if .Values.controller.a2aClientTimeout }}
  KAGENT_A2A_CLIENT_TIMEOUT: {{ .Values.controller.a2aClientTimeout | quote }}
  {{- end }}
  ZAP_LOG_LEVEL: {{ .Values.controller.loglevel | quote }}
  {{- $agentHost := "" }}
  {{- if and .Values.controller.agentDeployment .Values.controller.agentDeployment.host (not (eq .Values.controller.agentDeployment.host "")) }}
  {{- $agentHost = .Values.controller.agentDeployment.host }}
  {{- else if .Values.ipv6.enabled }}
  {{- $agentHost = "::" }}
  {{- end }}
  {{- if $agentHost }}
  DEFAULT_AGENT_BIND_HOST: {{ $agentHost | quote }}
  {{- end }}
  {{- if and .Values.controller.agentDeployment .Values.controller.agentDeployment.serviceAccountName (not (eq .Values.controller.agentDeployment.serviceAccountName "")) }}
  DEFAULT_SERVICE_ACCOUNT_NAME: {{ .Values.controller.agentDeployment.serviceAccountName | quote }}
  {{- end }}
  {{- if and .Values.controller.agentDeployment .Values.controller.agentDeployment.podLabels }}
  {{- $pairs := list }}
  {{- range $k := keys .Values.controller.agentDeployment.podLabels | sortAlpha }}
  {{- $pairs = append $pairs (printf "%s=%s" $k (index $.Values.controller.agentDeployment.podLabels $k | toString)) }}
  {{- end }}
  {{- if $pairs }}
  DEFAULT_AGENT_POD_LABELS: {{ join "," $pairs | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.controller.agentDeployment .Values.controller.agentDeployment.nodeSelector }}
  {{- $nsPairs := list }}
  {{- range $k := keys .Values.controller.agentDeployment.nodeSelector | sortAlpha }}
  {{- $nsPairs = append $nsPairs (printf "%s=%s" $k (index $.Values.controller.agentDeployment.nodeSelector $k | toString)) }}
  {{- end }}
  {{- if $nsPairs }}
  DEFAULT_AGENT_NODE_SELECTOR: {{ join "," $nsPairs | quote }}
  {{- end }}
  {{- end }}
