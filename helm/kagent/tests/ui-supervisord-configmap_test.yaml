suite: test ui supervisord configmap
templates:
  - ui-supervisord-configmap.yaml
tests:
  - it: should always render the supervisord ConfigMap
    template: ui-supervisord-configmap.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ui-supervisord
      - exists:
          path: data["supervisord.conf"]

  - it: should use IPv4 HOSTNAME by default
    template: ui-supervisord-configmap.yaml
    asserts:
      - matchRegex:
          path: data["supervisord.conf"]
          pattern: 'HOSTNAME="0\.0\.0\.0"'
      - notMatchRegex:
          path: data["supervisord.conf"]
          pattern: 'HOSTNAME="::"'

  - it: should use dual-stack HOSTNAME when ipv6 is enabled
    template: ui-supervisord-configmap.yaml
    set:
      ipv6:
        enabled: true
    asserts:
      - matchRegex:
          path: data["supervisord.conf"]
          pattern: 'HOSTNAME="::"'
      - notMatchRegex:
          path: data["supervisord.conf"]
          pattern: 'HOSTNAME="0\.0\.0\.0"'
