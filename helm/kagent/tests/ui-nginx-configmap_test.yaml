suite: test ui nginx configmap
templates:
  - ui-nginx-configmap.yaml
tests:
  - it: should always render the nginx ConfigMap
    template: ui-nginx-configmap.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ui-nginx
      - exists:
          path: data["nginx.conf"]

  - it: should only have IPv4 listen by default
    template: ui-nginx-configmap.yaml
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: "listen 8080;"
      - notMatchRegex:
          path: data["nginx.conf"]
          pattern: "listen \\[::\\]:8080;"

  - it: should add IPv6 listen when ipv6 is enabled
    template: ui-nginx-configmap.yaml
    set:
      ipv6:
        enabled: true
    asserts:
      - matchRegex:
          path: data["nginx.conf"]
          pattern: "listen 8080;"
      - matchRegex:
          path: data["nginx.conf"]
          pattern: "listen \\[::\\]:8080;"
