suite: test ui nginx configmap
templates:
  - ui-nginx-configmap.yaml
tests:
  - it: should not render ConfigMap when nginxConfig is empty
    template: ui-nginx-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ConfigMap when nginxConfig is set
    template: ui-nginx-configmap.yaml
    set:
      ui:
        nginxConfig: |
          pid /tmp/nginx.pid;
          events { worker_connections 1024; }
          http {
            server {
              listen 8080;
              listen [::]:8080;
              location /health { return 200 'OK'; }
            }
          }
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: RELEASE-NAME-ui-nginx
      - exists:
          path: data["nginx.conf"]
