suite: test default modelconfig namespaces
templates:
  - modelconfig.yaml
  - modelconfig-secret.yaml
tests:
  - it: should render a single modelconfig in the release namespace by default
    template: modelconfig.yaml
    release:
      namespace: kagent
    set:
      providers.default: openAI
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: kagent

  - it: should render a modelconfig copy into each watched namespace
    template: modelconfig.yaml
    release:
      namespace: kagent
    set:
      providers.default: openAI
      controller.watchNamespaces:
        - agents
        - more-agents
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.namespace
          value: agents
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: more-agents
        documentIndex: 1
      - equal:
          path: metadata.name
          value: default-model-config
        documentIndex: 1

  - it: should fall back to rbac.namespaces when controller.watchNamespaces is empty
    template: modelconfig.yaml
    release:
      namespace: kagent
    set:
      providers.default: openAI
      rbac.namespaces:
        - team-a
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: team-a

  - it: should prefer controller.watchNamespaces over rbac.namespaces
    template: modelconfig.yaml
    release:
      namespace: kagent
    set:
      providers.default: openAI
      controller.watchNamespaces:
        - agents
      rbac.namespaces:
        - team-a
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: agents

  - it: should render the api key secret into each watched namespace
    template: modelconfig-secret.yaml
    release:
      namespace: kagent
    set:
      controller.watchNamespaces:
        - agents
        - more-agents
      providers:
        default: openAI
        openAI:
          provider: OpenAI
          model: "gpt-4.1-mini"
          apiKeySecretRef: kagent-openai
          apiKeySecretKey: OPENAI_API_KEY
          apiKey: test-key
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.namespace
          value: agents
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: more-agents
        documentIndex: 1

  - it: should keep the api key secret in the release namespace when unscoped
    template: modelconfig-secret.yaml
    release:
      namespace: kagent
    set:
      providers:
        default: openAI
        openAI:
          provider: OpenAI
          model: "gpt-4.1-mini"
          apiKeySecretRef: kagent-openai
          apiKeySecretKey: OPENAI_API_KEY
          apiKey: test-key
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: kagent
