suite: test controller servicemonitor
templates:
  - controller-servicemonitor.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when CRD is not installed
    set:
      controller.metrics.enabled: true
      controller.metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceMonitor when both enabled and CRD present
    set:
      controller.metrics.enabled: true
      controller.metrics.serviceMonitor.enabled: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1/ServiceMonitor
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: metrics

  - it: should target controller-metrics service via selector
    set:
      controller.metrics.enabled: true
      controller.metrics.serviceMonitor.enabled: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1/ServiceMonitor
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: controller-metrics

  - it: should add TLS config when secure is true
    set:
      controller.metrics.enabled: true
      controller.metrics.serviceMonitor.enabled: true
      controller.metrics.secure: true
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1/ServiceMonitor
    asserts:
      - equal:
          path: spec.endpoints[0].scheme
          value: https
      - equal:
          path: spec.endpoints[0].tlsConfig.insecureSkipVerify
          value: true

  - it: should not add TLS config when secure is false
    set:
      controller.metrics.enabled: true
      controller.metrics.serviceMonitor.enabled: true
      controller.metrics.secure: false
    capabilities:
      apiVersions:
        - monitoring.coreos.com/v1/ServiceMonitor
    asserts:
      - isNull:
          path: spec.endpoints[0].scheme
      - isNull:
          path: spec.endpoints[0].tlsConfig
