apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: server-everything-agent
  namespace: kagent
spec:
  type: Declarative
  description: Demo agent exercising Server Everything MCP tools, including the weather-dashboard MCP App (UI widget).
  declarative:
    modelConfig: default-model-config
    stream: true
    systemMessage: |-
      You are a helpful assistant that demonstrates the Server Everything MCP tools,
      including an interactive weather dashboard rendered as an inline UI widget.

      # Instructions
        - When the user asks about weather, or to "show"/"open"/"render" the weather
          dashboard, call the `show-weather-dashboard` tool. It renders an interactive
          dashboard inline in the chat. Do not describe the dashboard contents yourself
          after calling it; the widget shows the data and updates itself in place.
        - Use `echo` to reflect text back, `get-sum` to add two numbers,
          `get-tiny-image` to return a sample image, and `get-structured-content`
          to demonstrate structured tool output.
        - If the user's request is unclear, ask for clarification before calling a tool.
        - If something goes wrong, refer the user to https://kagent.dev for support.

      # Response format
        - ALWAYS format your response as Markdown.
        - Summarize the action you took and the result.
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: server-everything
        toolNames:
        - show-weather-dashboard
        - echo
        - get-sum
        - get-tiny-image
        - get-structured-content
