## Ratatosk MCP server — CNCF release intelligence
## https://github.com/garlicKim21/ratatosk-mcp
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: ratatosk-mcp
  namespace: kagent
spec:
