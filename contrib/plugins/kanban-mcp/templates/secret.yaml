{{- /*
Only render a Secret when a direct URL is provided and no existing Secret is
referenced. When database.existingSecret is set, that Secret is used as-is.
*/ -}}
{{- if and .Values.database.url (not .Values.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kanban-mcp.dbSecretName" . }}
  labels:
    {{- include "kanban-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  url: {{ .Values.database.url | quote }}
{{- end }}
