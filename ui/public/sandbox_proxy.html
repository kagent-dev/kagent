<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MCP Apps Sandbox Proxy</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <script>
    // The host page passes its origin via ?parentOrigin=...; fall back to this
    // document's own origin (the proxy is served from the host's origin). We
    // never trust "*" — only messages from (and posts to) the expected parent.
    var params = new URLSearchParams(window.location.search);
    var parentOrigin = params.get("parentOrigin") || window.location.origin;

    function joinDomains(list) {
      return Array.isArray(list)
        ? list.filter(function (d) { return typeof d === "string" && d; }).join(" ")
        : "";
    }

    // Build the CSP for the untrusted view from the resource's _meta.ui.csp,
    // following the MCP Apps spec construction: restrictive defaults, only
    // server-declared origins are allowed, dangerous features blocked. With no
    // csp metadata this yields the spec's restrictive default.
    function buildCsp(csp) {
      csp = csp && typeof csp === "object" ? csp : {};
      var resource = joinDomains(csp.resourceDomains);
      var connect = joinDomains(csp.connectDomains);
      var frame = joinDomains(csp.frameDomains);
      var base = joinDomains(csp.baseUriDomains);
      return [
        "default-src 'none'",
        ("script-src 'self' 'unsafe-inline' " + resource).trim(),
        ("style-src 'self' 'unsafe-inline' " + resource).trim(),
        ("connect-src 'self' " + connect).trim(),
        ("img-src 'self' data: " + resource).trim(),
        ("font-src 'self' " + resource).trim(),
        ("media-src 'self' data: " + resource).trim(),
        "frame-src " + (frame || "'none'"),
        "object-src 'none'",
        "base-uri " + (base || "'self'")
      ].join("; ") + ";";
    }

    // Inject the CSP as a <meta> at the start of <head> so the policy is parsed
    // before any governed content/scripts in the view.
    function injectCsp(html, cspValue) {
      var tag = '<meta http-equiv="Content-Security-Policy" content="' + cspValue + '">';
      if (/<head[^>]*>/i.test(html)) {
        return html.replace(/<head[^>]*>/i, function (m) { return m + tag; });
      }
      if (/<html[^>]*>/i.test(html)) {
        return html.replace(/<html[^>]*>/i, function (m) { return m + "<head>" + tag + "</head>"; });
      }
      return "<head>" + tag + "</head>" + html;
    }

    window.addEventListener("message", (event) => {
      // Reject messages from any origin other than the expected parent so a
      // page embedding this iframe cannot inject arbitrary HTML/script.
      if (event.origin !== parentOrigin) return;

      const data = event.data;
      if (!data || typeof data !== "object") return;

      if (data.method === "ui/notifications/sandbox-resource-ready") {
        const html = data.params && data.params.html;
        if (typeof html === "string") {
          const cspValue = buildCsp(data.params && data.params.csp);
          document.open();
          document.write(injectCsp(html, cspValue));
          document.close();
        }
      }
    });

    window.parent.postMessage({
      method: "ui/notifications/sandbox-proxy-ready",
      params: {}
    }, parentOrigin);
  </script>
</body>
</html>
